load_module /usr/lib/nginx/modules/ngx_http_js_module.so;

events {
    worker_connections 1024;
}

http {
    js_import auth from /etc/nginx/auth.js;
    js_var $jwt_user_id '';

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream user-service {
        server user-service:8081;
    }

    upstream problem-service {
        server problem-service:8082;
    }

    upstream submission-service {
        server submission-service:8083;
    }

    upstream result-service {
        server result-service:8086;
    }

    server {
        listen 8080;
        server_name localhost;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /api/judge {
            return 403 'Internal service not accessible via gateway';
        }

        location /api/container {
            return 403 'Internal service not accessible via gateway';
        }

        location /api/internal {
            return 403 'Internal service not accessible via gateway';
        }

        location /api/user {
            js_content auth.jwt_auth;
        }

        location /api/problem {
            js_content auth.jwt_auth;
        }

        location /api/submission {
            js_content auth.jwt_auth;
        }

        location /api/result {
            js_content auth.jwt_auth;
        }

        location /upstream {
            internal;

            location /upstream/api/user {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://user-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-User-Id $jwt_user_id;
            }

            location /upstream/api/problem {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://problem-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-User-Id $jwt_user_id;
            }

            location /upstream/api/submission {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://submission-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-User-Id $jwt_user_id;
            }

            location /upstream/api/result {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://result-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-User-Id $jwt_user_id;
            }
        }
    }
}