version: '3.8'

services:
  # API Gateway
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: sql-judge-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./configs/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - problem-service
      - submission-service
      - result-service
    networks:
      - sql-judge-network

  # User Service
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: sql-judge-user-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/business_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - JWT_SECRET=your-256-bit-secret-key-for-jwt-signing
      - JWT_EXPIRATION=86400000
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sql-judge-network

  # Problem Service
  problem-service:
    build:
      context: ./services/problem-service
      dockerfile: Dockerfile
    container_name: sql-judge-problem-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/business_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - USER_SERVICE_URL=http://user-service:8081
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sql-judge-network

  # Submission Service
  submission-service:
    build:
      context: ./services/submission-service
      dockerfile: Dockerfile
    container_name: sql-judge-submission-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/business_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sql-judge-network

  # Judge Service
  judge-service:
    build:
      context: ./services/judge-service
      dockerfile: Dockerfile
    container_name: sql-judge-judge-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/business_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - CONTAINER_MANAGER_URL=http://container-manager:8085
      - PROBLEM_SERVICE_URL=http://problem-service:8082
      - RESULT_SERVICE_URL=http://result-service:8086
      - AI_API_KEY=sk-8bf38558d1fa48019ac55fae0fe61b55
      - AI_API_HOST=ws-ubve98npfvjw8ncr.cn-beijing.maas.aliyuncs.com
      - AI_MODEL=qwen-turbo
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sql-judge-network
      - judge_net

  # Container Manager
  container-manager:
    build:
      context: ./services/container-manager
      dockerfile: Dockerfile
    container_name: sql-judge-container-manager
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/business_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - DOCKER_HOST=tcp://docker:2375
      - CONTAINER_POOL_SIZE=5
      - CONTAINER_MYSQL_ROOT_PASSWORD=container_root_pass
      - JUDGE_IMAGE=sql-judge/mysql-judge:1.0
      - JUDGE_NETWORK=judge_net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8085"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sql-judge-network
      - judge_net

  # Result Service
  result-service:
    build:
      context: ./services/result-service
      dockerfile: Dockerfile
    container_name: sql-judge-result-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/business_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sql-judge-network

  # MySQL Business Database
  mysql:
    image: mysql:8.0
    container_name: sql-judge-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=business_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./configs/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sql-judge-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sql-judge-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sql-judge-network

  # Docker-in-Docker (for container management)
  docker:
    image: docker:dind
    container_name: sql-judge-docker
    privileged: true
    ports:
      - "2375:2375"
    environment:
      - DOCKER_TLS_CERTDIR=
      - DOCKER_HOST=tcp://0.0.0.0:2375
    volumes:
      - docker-data:/var/lib/docker
    networks:
      - sql-judge-network

volumes:
  mysql-data:
  rabbitmq-data:
  docker-data:

networks:
  sql-judge-network:
    driver: bridge
  judge_net:
    driver: bridge
    name: judge_net
    internal: false
